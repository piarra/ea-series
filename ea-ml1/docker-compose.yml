services:
  trainer:
    build:
      context: .
      dockerfile: Dockerfile
    image: xau-ml:arm64
    platform: linux/arm64
    working_dir: /work
    volumes:
      - ./work:/work
      - ./data:/data
      - ./models:/models
      - ./cache:/cache
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Tokyo
      # 任意：スレッド数（M4はコア多いので調整）
      - OMP_NUM_THREADS=8
      - OPENBLAS_NUM_THREADS=8
      - MKL_NUM_THREADS=8
    command: ["python", "train.py"]

  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    image: xau-ml:arm64
    platform: linux/arm64
    working_dir: /work
    volumes:
      - ./work:/work
      - ./data:/data
      - ./models:/models
      - ./cache:/cache
    environment:
      - TZ=Asia/Tokyo
      - PYTHONUNBUFFERED=1
      - OMP_NUM_THREADS=8
      - OPENBLAS_NUM_THREADS=8
    ports:
      - "8888:8888"
    command:
      [
        "bash", "-lc",
        "jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --NotebookApp.token='' --NotebookApp.password=''"
      ]
